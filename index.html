<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0739/5203/5098/files/eazpire-creator-logo.png?v=1763666950">
  <title>Eazpire Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/vendor/theme/creator-mobile.css?v=7">
  <link rel="stylesheet" href="/vendor/theme/creator-seamless-bg.css?v=7">
  <link rel="stylesheet" href="/vendor/theme/creator-theme-background.css?v=8">
  <link rel="stylesheet" href="/vendor/theme/creator-mobile-screens.css?v=8">
  <link rel="stylesheet" href="/vendor/theme/creator-daily-limits-subheader.css?v=2">
  <!-- Header audio widget styles (play/pause icons + visualizer) â€” must be present at first paint -->
  <link rel="stylesheet" href="/vendor/theme/creator-audio-modal.css?v=8">
  <link rel="stylesheet" media="(min-width: 992px)" href="/vendor/theme/creator-desktop.css?v=8">
  <link rel="stylesheet" href="/css/creator-portal.css?v=19">
  <script>
    window.__CREATOR_PORTAL_HOST__ = true;
    window.__CREATOR_DASHBOARD_EMBED_PAGE = true;
    window.__EAZ_SKIP_SHOP_LIST_JOBS__ = true;
    window.__EAZ_DEFER_CREATOR_DESIGN_MODAL__ = true;
    window.__CREATOR_THEME_DEFAULTS__ = {
      mobile: { media_type: "image", url: "https://cdn.shopify.com/s/files/1/0739/5203/5098/files/galaxy-nebula-bg.png" },
      desktop: { media_type: "image", url: "https://cdn.shopify.com/s/files/1/0739/5203/5098/files/galaxy-nebula-bg.png" }
    };
  </script>
</head>
<body class="creator-mobile-page is-boot-loading" data-role="guest">

<div class="creator-boot" id="creatorBoot" role="status" aria-live="polite" aria-label="Loading Eazpire Creator">
  <div class="creator-boot__center">
    <img class="creator-boot__logo" src="https://cdn.shopify.com/s/files/1/0739/5203/5098/files/eazpire-creator-logo.png?v=1763666950" alt="" width="320" height="112" decoding="async" fetchpriority="high">
    <div class="creator-boot__bar-wrap" aria-hidden="true">
      <div class="creator-boot__bar">
        <div class="creator-boot__bar-fill"></div>
        <div class="creator-boot__bar-stars"></div>
      </div>
    </div>
    <span class="creator-boot__status" id="creatorBootStatus">Loading Creator Hub</span>
  </div>
</div>

<div id="creatorPortalApp" hidden>
  <div id="creatorPortalShell"></div>

  <div class="creator-login-bg" id="creatorLoginModal" aria-hidden="true">
    <div class="creator-login panel" role="dialog" aria-modal="true" aria-labelledby="creatorLoginTitle">
      <div class="creator-login__head">
        <h2 id="creatorLoginTitle">Sign in to Creator</h2>
        <button type="button" class="creator-login__close" id="creatorLoginClose" data-login-close aria-label="Close">âœ•</button>
      </div>
      <p class="creator-login__sub">Use your Eazpire shop account. You will return here after login.</p>
      <a class="btn primary creator-login__btn" href="/auth/login">Continue with Shop account</a>
      <button type="button" class="btn ghost creator-login__btn" data-oauth-start style="margin-top:8px;width:100%">
        OAuth (account.eazpire.com)
      </button>
      <p class="creator-login__foot">Secure login via <strong>www.eazpire.com</strong></p>
    </div>
  </div>

  <div class="toast" id="toast"><strong id="tTitle">Done</strong><span id="tText">OK</span></div>

  <div class="creator-view-mode-overlay" id="creatorViewModeOverlay" aria-hidden="true">
    <div class="creator-view-mode-modal" role="dialog" aria-label="View options">
      <div class="creator-view-mode-options">
        <button type="button" class="creator-view-mode-opt" data-view="grid2"><span>2 columns</span></button>
        <button type="button" class="creator-view-mode-opt" data-view="grid3"><span>3 columns</span></button>
        <button type="button" class="creator-view-mode-opt" data-view="grid4"><span>4 columns</span></button>
        <button type="button" class="creator-view-mode-opt" data-view="list"><span>List</span></button>
      </div>
    </div>
  </div>

  <div id="creatorPortalModals"></div>
</div>

<script src="/js/creator-i18n.js?v=7" defer></script>
<script src="/js/api.js?v=7" defer></script>
<script src="/js/theme-bridge.js?v=7" defer></script>
<script src="/js/auth.js?v=8" defer></script>
<script src="/js/shell-loader.js?v=11" defer></script>
<script src="/js/router.js?v=8" defer></script>
<script src="/js/feature-loader.js?v=ppm-ds-ux-20260719b" defer></script>
<script src="/js/eazy-loader.js?v=10" defer></script>
<script src="/js/dashboard.js?v=7" defer></script>
<script src="/js/app.js?v=10" defer></script>
</body>
</html>
