<div
  id="creatorDesignStudioModal"
  class="cds-modal-root"
  hidden
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
  aria-labelledby="cds-modal-title"
>
  <div class="cds-modal__backdrop" data-cds-close></div>
  <div class="cds-modal__shell">
    <header class="cds-modal__header">
      <button type="button" class="cds-modal__drawer-toggle" id="cds-drawer-toggle" aria-expanded="false" aria-controls="cds-sidebar">
        <span class="cds-modal__drawer-icon" aria-hidden="true"></span>
      </button>
      <div class="cds-modal__header-text">
        <h2 id="cds-modal-title" class="cds-modal__title" data-t="creator.design_studio.title">Design Studio</h2>
        <p class="cds-modal__subtitle" id="cds-modal-subtitle"></p>
      </div>
      <div class="cds-modal__header-actions">
        <button type="button" class="cds-modal__btn cds-modal__btn--save" id="cds-btn-save" data-t="creator.design_studio.save">Save</button>
        <button type="button" class="cds-modal__btn cds-modal__btn--icon" id="cds-btn-close" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
    </header>

    <div class="cds-modal__body">
      <nav class="cds-modal__sidebar" id="cds-sidebar" aria-label="Design studio sections">
        <button type="button" class="cds-modal__nav-item is-active" data-cds-tab="print_area" aria-current="page" title="Print Area">
          <span class="cds-modal__nav-icon" aria-hidden="true">▣</span>
          <span class="cds-modal__nav-label" data-t="creator.design_studio.tab_print_area">Print Area</span>
        </button>
        <button type="button" class="cds-modal__nav-item" data-cds-tab="variants" title="Variants">
          <span class="cds-modal__nav-icon" aria-hidden="true">◫</span>
          <span class="cds-modal__nav-label" data-t="creator.design_studio.tab_variants">Variants</span>
        </button>
        <button type="button" class="cds-modal__nav-item" data-cds-tab="publication" title="Publication">
          <span class="cds-modal__nav-icon" aria-hidden="true">◎</span>
          <span class="cds-modal__nav-label" data-t="creator.design_studio.tab_publication">Publication</span>
        </button>
        <button type="button" class="cds-modal__nav-item" data-cds-tab="mockups" title="Mockups">
          <span class="cds-modal__nav-icon" aria-hidden="true">▤</span>
          <span class="cds-modal__nav-label" data-t="creator.design_studio.tab_mockups">Mockups</span>
        </button>
        <button type="button" class="cds-modal__nav-item" data-cds-tab="prices" title="Prices">
          <span class="cds-modal__nav-icon" aria-hidden="true">$</span>
          <span class="cds-modal__nav-label" data-t="creator.design_studio.tab_prices">Prices</span>
        </button>
      </nav>

      <div class="cds-modal__main">
        <div class="cds-modal__status" id="cds-status" role="status"></div>
        <div class="cds-modal__panels">
          <section class="cds-panel is-active" data-cds-panel="print_area" id="cds-panel-print-area"></section>
          <section class="cds-panel" data-cds-panel="variants" id="cds-panel-variants" hidden></section>
          <section class="cds-panel" data-cds-panel="publication" id="cds-panel-publication" hidden></section>
          <section class="cds-panel" data-cds-panel="mockups" id="cds-panel-mockups" hidden></section>
          <section class="cds-panel" data-cds-panel="prices" id="cds-panel-prices" hidden></section>
        </div>
      </div>
    </div>
  </div>
</div>
