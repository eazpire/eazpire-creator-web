<div
  id="creatorDesignStudioModal"
  class="cds-modal-root cds-modal-root--fullscreen"
  hidden
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
  aria-labelledby="cds-modal-title"
>
  <div class="cds-modal__shell">
    <header class="cds-modal__header">
      <div class="cds-modal__header-text">
        <h2 id="cds-modal-title" class="cds-modal__title" data-t="creator.design_studio.title">Design Studio</h2>
        <p class="cds-modal__subtitle" id="cds-modal-subtitle"></p>
      </div>
      <div class="cds-modal__header-actions">
        <button type="button" class="cds-modal__btn cds-modal__btn--icon" id="cds-btn-close" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
    </header>

    <div class="cds-modal__status" id="cds-status" role="status"></div>

    <div class="cds-modal__workspace">
      <section class="cds-viewer-column" aria-label="Product mock preview">
        <div class="cds-viewer-pos-bar" id="cds-pos-bar" role="tablist" aria-label="Print position"></div>
        <div class="cds-viewer" id="cds-viewer">
          <img class="cds-viewer__mock" id="cds-mock-img" alt="" hidden decoding="async">
          <p class="cds-viewer__empty" id="cds-viewer-empty" hidden data-t="creator.design_studio.no_mock">No mock available for this view.</p>
          <div class="cds-viewer__design-wrap" id="cds-design-wrap" hidden>
            <img class="cds-viewer__design" id="cds-primary-design" alt="" decoding="async">
            <div class="cds-design-chrome" id="cds-design-chrome" hidden>
              <span class="cds-design-handle cds-design-handle--nw" data-cds-rz="nw"></span>
              <span class="cds-design-handle cds-design-handle--n" data-cds-rz="n"></span>
              <span class="cds-design-handle cds-design-handle--ne" data-cds-rz="ne"></span>
              <span class="cds-design-handle cds-design-handle--e" data-cds-rz="e"></span>
              <span class="cds-design-handle cds-design-handle--se" data-cds-rz="se"></span>
              <span class="cds-design-handle cds-design-handle--s" data-cds-rz="s"></span>
              <span class="cds-design-handle cds-design-handle--sw" data-cds-rz="sw"></span>
              <span class="cds-design-handle cds-design-handle--w" data-cds-rz="w"></span>
              <span class="cds-design-handle cds-design-handle--rotate" data-cds-rz="rotate"></span>
            </div>
          </div>
        </div>
      </section>

      <aside class="cds-settings-column">
        <div class="cds-settings-tabs" role="tablist">
          <button type="button" class="cds-settings-tab is-active" data-cds-settings-tab="design" role="tab" aria-selected="true" data-t="creator.design_studio.tab_design_settings">Design Settings</button>
          <button type="button" class="cds-settings-tab" data-cds-settings-tab="variants" role="tab" aria-selected="false" data-t="creator.design_studio.tab_variant_settings">Variant Settings</button>
        </div>
        <div class="cds-settings-scroll" id="cds-settings-scroll">
          <div class="cds-settings-panel is-active" data-cds-settings-panel="design" id="cds-panel-design"></div>
          <div class="cds-settings-panel" data-cds-settings-panel="variants" id="cds-panel-variants" hidden></div>
        </div>
        <footer class="cds-settings-footer">
          <button type="button" class="cds-btn-secondary" id="cds-btn-reset" data-t="creator.design_studio.reset_defaults">Reset to admin defaults</button>
          <button type="button" class="cds-modal__btn cds-modal__btn--save" id="cds-btn-save" data-t="creator.design_studio.save">Save</button>
        </footer>
      </aside>
    </div>
  </div>

  <div class="cds-submodal" id="cds-add-menu" hidden aria-hidden="true">
    <div class="cds-submodal__backdrop" data-cds-sub-close></div>
    <div class="cds-submodal__sheet" role="dialog" aria-labelledby="cds-add-menu-title">
      <h3 id="cds-add-menu-title" class="cds-submodal__title" data-t="creator.design_studio.add_designs">Add Designs</h3>
      <div class="cds-submodal__actions">
        <div class="cds-submodal__group">
          <span class="cds-submodal__label" data-t="creator.design_studio.upload">Upload</span>
          <button type="button" class="cds-btn-secondary" data-cds-add-upload="device" data-t="creator.design_studio.upload_device">Device</button>
          <button type="button" class="cds-btn-secondary" data-cds-add-upload="phone" data-t="creator.design_studio.upload_phone">Phone</button>
        </div>
        <button type="button" class="cds-btn-secondary" data-cds-add-my-designs data-t="creator.design_studio.my_designs">My Designs</button>
        <button type="button" class="cds-btn-secondary" data-cds-add-public-designs data-t="creator.design_studio.public_designs">Public Designs</button>
      </div>
      <button type="button" class="cds-btn-secondary cds-submodal__cancel" data-cds-sub-close data-t="creator.common.cancel">Cancel</button>
    </div>
  </div>

  <div class="cds-submodal cds-submodal--picker" id="cds-design-picker" hidden aria-hidden="true">
    <div class="cds-submodal__backdrop" data-cds-sub-close></div>
    <div class="cds-submodal__sheet cds-submodal__sheet--wide" role="dialog" aria-labelledby="cds-picker-title">
      <header class="cds-submodal__head">
        <h3 id="cds-picker-title" class="cds-submodal__title"></h3>
        <button type="button" class="cds-modal__btn cds-modal__btn--icon" data-cds-sub-close aria-label="Close">&times;</button>
      </header>
      <div class="cds-picker-grid" id="cds-picker-grid"></div>
      <p class="cds-muted cds-picker-empty" id="cds-picker-empty" hidden></p>
    </div>
  </div>

  <input type="file" id="cds-upload-input" accept="image/*" hidden>
</div>
