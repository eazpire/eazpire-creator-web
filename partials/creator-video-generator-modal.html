<div
  id="creatorVideoGeneratorModal"
  class="cvg-modal-root"
  hidden
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
  aria-labelledby="cvg-modal-title"
>
  <div class="cvg-modal__shell">
    <header class="cvg-modal__header">
      <div class="cvg-modal__header-left">
        <button
          type="button"
          class="cvg-btn cvg-btn--icon cvg-btn--menu"
          id="cvg-btn-menu"
          aria-label="Open menu"
          title="Open menu"
        >
          <span aria-hidden="true">☰</span>
        </button>
        <h2 id="cvg-modal-title" class="cvg-modal__title" data-t="creator.video_generator.title">Video Generator</h2>
      </div>
      <button
        type="button"
        class="cvg-btn cvg-btn--icon"
        id="cvg-btn-close"
        aria-label="Close"
      >
        ×
      </button>
    </header>

    <div class="cvg-subheader" id="cvg-subheader" data-cvg-subheader>
      <button
        type="button"
        class="cvg-subheader__toggle"
        id="cvg-subheader-toggle"
        aria-expanded="false"
        aria-controls="cvg-subheader-panel"
      >
        <span class="cvg-subheader__label" data-t="creator.video_generator.results">Results</span>
        <span class="cvg-subheader__count" id="cvg-subheader-count" hidden>0</span>
        <span class="cvg-subheader__chevron" aria-hidden="true">▾</span>
      </button>
      <div class="cvg-subheader__panel" id="cvg-subheader-panel" hidden>
        <div class="cvg-carousel" id="cvg-carousel" role="list"></div>
      </div>
    </div>

    <div class="cvg-body">
      <aside class="cvg-sidebar" id="cvg-sidebar" aria-label="Menu">
        <nav class="cvg-sidebar__nav">
          <button
            type="button"
            class="cvg-sidebar__item is-active"
            data-cvg-tool="motion_control"
            data-t="creator.video_generator.motion_control"
          >Motion Control</button>
        </nav>
        <button
          type="button"
          class="cvg-rail"
          id="cvg-sidebar-toggle"
          aria-label="Toggle sidebar"
          aria-expanded="true"
        >
          ‹
        </button>
      </aside>

      <div class="cvg-drawer-scrim" id="cvg-drawer-scrim" hidden></div>

      <main class="cvg-main" id="cvg-main">
        <section class="cvg-panel" data-cvg-panel="motion_control">
          <div class="cvg-motion-layout">
            <div class="cvg-motion-row">
              <div class="cvg-motion-card">
                <div class="cvg-motion-card__head">
                  <span class="cvg-motion-card__icon" aria-hidden="true">🎬</span>
                  <span class="cvg-motion-card__title" data-t="creator.content_creation.videos.motion_reference_upload_title">Reference motion video</span>
                </div>
                <div class="cvg-upload-status" data-cvg-motion-status hidden></div>
                <div class="cvg-upload-area" data-cvg-upload="motion-video" role="button" tabindex="0">
                  <div class="cvg-upload-placeholder" data-cvg-motion-placeholder>
                    <span class="cvg-upload-add" aria-hidden="true">+</span>
                  </div>
                  <div class="cvg-upload-preview" data-cvg-motion-preview hidden>
                    <video playsinline controls class="cvg-preview-video" data-cvg-motion-preview-video></video>
                    <button
                      type="button"
                      class="cvg-preview-remove"
                      data-cvg-motion-remove
                      aria-label="Remove video"
                    >×</button>
                  </div>
                </div>
              </div>

              <div class="cvg-motion-card">
                <div class="cvg-motion-card__head">
                  <span class="cvg-motion-card__icon" aria-hidden="true">🖼️</span>
                  <span class="cvg-motion-card__title" data-t="creator.content_creation.videos.motion_character_image_title">Character image</span>
                </div>
                <div class="cvg-upload-status" data-cvg-character-status hidden></div>
                <div class="cvg-upload-area" data-cvg-upload="character" role="button" tabindex="0">
                  <div class="cvg-upload-placeholder" data-cvg-character-placeholder>
                    <span class="cvg-upload-add" aria-hidden="true">+</span>
                  </div>
                  <div class="cvg-upload-preview" data-cvg-character-preview hidden>
                    <img class="cvg-preview-img" data-cvg-character-preview-img alt="">
                    <button
                      type="button"
                      class="cvg-preview-remove"
                      data-cvg-character-remove
                      aria-label="Remove character image"
                    >×</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="cvg-field">
              <label class="cvg-field__label" for="cvg-prompt" data-t="creator.video_generator.prompt_label">Prompt (optional)</label>
              <textarea
                id="cvg-prompt"
                class="cvg-field__textarea"
                rows="3"
                data-cvg-prompt
                placeholder="Optional guidance for scene, lighting, or motion."
              ></textarea>
            </div>

            <div class="cvg-field">
              <span class="cvg-field__label" data-t="creator.content_creation.videos.character_orientation_label">Character orientation</span>
              <div class="cvg-orient-row">
                <div class="cvg-orient-switch" role="group" aria-label="Character orientation">
                  <button type="button" class="cvg-orient-btn is-active" data-cvg-orient="video">
                    Video
                  </button>
                  <button type="button" class="cvg-orient-btn" data-cvg-orient="image">
                    Image
                  </button>
                </div>
                <label class="cvg-checkbox">
                  <input type="checkbox" data-cvg-keep-sound checked>
                  <span data-t="creator.content_creation.videos.motion_keep_sound">Keep reference video audio</span>
                </label>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    
    <input
      type="file"
      accept="video/mp4,video/webm,video/quicktime,video/x-m4v,.mp4,.webm,.mov,.m4v"
      class="cvg-upload-input"
      data-cvg-input="motion-video"
      id="cvg-input-motion-video"
      hidden
      tabindex="-1"
      aria-hidden="true"
    >
    <input
      type="file"
      accept="image/*"
      class="cvg-upload-input"
      data-cvg-input="character"
      id="cvg-input-character"
      hidden
      tabindex="-1"
      aria-hidden="true"
    >

    <button
      type="button"
      class="cvg-generate-fab"
      id="cvg-generate-fab"
      hidden
      data-t="creator.video_generator.generate"
    >Generate</button>
  </div>
</div>


<div id="cvgAddSourceModal" class="cvs-confirm-overlay" hidden aria-hidden="true">
  <div
    class="cvs-confirm-box cvs-addsrc-box"
    role="dialog"
    aria-modal="true"
    aria-labelledby="cvg-addsrc-title"
  >
    <h3 class="cvs-confirm-title" id="cvg-addsrc-title">Add media</h3>
    <div class="cvs-addsrc-grid" id="cvg-addsrc-grid">
      <button type="button" class="cvs-addsrc-option" id="cvg-addsrc-assets" data-cvg-addsrc="assets">
        <span class="cvs-addsrc-option__icon" aria-hidden="true">&#128193;</span>
        <span class="cvs-addsrc-option__label">Assets</span>
        <span class="cvs-addsrc-option__hint">Your uploaded library</span>
      </button>
      <button type="button" class="cvs-addsrc-option" id="cvg-addsrc-generate-character" data-cvg-addsrc="generate-character" hidden>
        <span class="cvs-addsrc-option__icon" aria-hidden="true">&#129489;</span>
        <span class="cvs-addsrc-option__label">Generate Character</span>
        <span class="cvs-addsrc-option__hint">Open Character Generator</span>
      </button>
      <button type="button" class="cvs-addsrc-option" id="cvg-addsrc-device" data-cvg-addsrc="device">
        <span class="cvs-addsrc-option__icon" aria-hidden="true">&#128187;</span>
        <span class="cvs-addsrc-option__label">Device</span>
        <span class="cvs-addsrc-option__hint">Upload from this device</span>
      </button>
      <button type="button" class="cvs-addsrc-option" id="cvg-addsrc-phone" data-cvg-addsrc="phone" data-desktop-only="1">
        <span class="cvs-addsrc-option__icon" aria-hidden="true">&#128241;</span>
        <span class="cvs-addsrc-option__label">Phone</span>
        <span class="cvs-addsrc-option__hint">Scan a QR code to upload</span>
      </button>
      <button type="button" class="cvs-addsrc-option" id="cvg-addsrc-link" data-cvg-addsrc="link">
        <span class="cvs-addsrc-option__icon" aria-hidden="true">&#128279;</span>
        <span class="cvs-addsrc-option__label">Link</span>
        <span class="cvs-addsrc-option__hint">Paste a media URL</span>
      </button>
      <button type="button" class="cvs-addsrc-option" id="cvg-addsrc-paste" data-cvg-addsrc="paste" hidden>
        <span class="cvs-addsrc-option__icon" aria-hidden="true">&#128203;</span>
        <span class="cvs-addsrc-option__label">Paste from Clipboard</span>
        <span class="cvs-addsrc-option__hint">Use an image already copied</span>
      </button>
    </div>
    <div class="cvs-confirm-actions">
      <button type="button" class="cvs-btn cvs-btn--ghost" id="cvg-addsrc-cancel">Cancel</button>
    </div>
  </div>
</div>


<div id="cvgCharacterAssetsModal" class="cvs-confirm-overlay" hidden aria-hidden="true">
  <div class="cvs-confirm-box cvs-meta-box" role="dialog" aria-modal="true" aria-labelledby="cvg-char-assets-title">
    <h3 class="cvs-confirm-title" id="cvg-char-assets-title">Character Images</h3>
    <p class="cvs-link-status" id="cvg-char-assets-status" role="status"></p>
    <div class="cvg-char-assets-grid" id="cvg-char-assets-grid" role="list"></div>
    <div class="cvs-confirm-actions">
      <button type="button" class="cvs-btn cvs-btn--ghost" id="cvg-char-assets-cancel">Cancel</button>
    </div>
  </div>
</div>

<div id="cvgLinkModal" class="cvs-confirm-overlay" hidden aria-hidden="true">
  <div
    class="cvs-confirm-box cvs-meta-box cvs-link-box"
    role="dialog"
    aria-modal="true"
    aria-labelledby="cvg-link-title"
  >
    <h3 class="cvs-confirm-title" id="cvg-link-title">Add from link</h3>
    <div class="cvs-link-body">
      <div class="cvs-link-main">
        <label class="cvs-meta-field">
          <span>Media URL</span>
          <div class="cvs-link-url-row">
            <input type="url" id="cvg-link-url" placeholder="https://…">
            <button type="button" class="cvs-btn cvs-btn--ghost cvs-link-extract-btn" id="cvg-link-extract">
              Extract
            </button>
          </div>
        </label>
        <p class="cvs-link-status" id="cvg-link-status" role="status"></p>
        <div class="cvs-link-preview" id="cvg-link-preview" hidden>
          <video id="cvg-link-preview-video" class="cvs-link-preview__media" controls playsinline hidden></video>
          <img id="cvg-link-preview-image" class="cvs-link-preview__media" alt="" hidden>
        </div>
      </div>
      <div class="cvs-link-phone" id="cvg-link-phone" data-desktop-only="1">
        <p class="cvs-link-phone__title">Or scan with your phone</p>
        <div class="cvs-link-phone__qr-wrap">
          <img id="cvg-link-qr-img" class="cvs-link-phone__qr" alt="" width="120" height="120" loading="lazy">
        </div>
        <p class="cvs-link-phone__hint">Paste the link on your phone — it fills in here automatically.</p>
        <p class="cvs-link-phone__status" id="cvg-link-phone-status" role="status"></p>
      </div>
    </div>
    <div class="cvs-modal-footer cvs-confirm-actions">
      <button type="button" class="cvs-btn cvs-btn--ghost" id="cvg-link-cancel">Cancel</button>
      <button type="button" class="cvs-btn cvs-btn--primary" id="cvg-link-submit" disabled>Download</button>
    </div>
  </div>
</div>
