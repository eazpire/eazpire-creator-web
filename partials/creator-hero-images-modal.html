<div
  id="creatorHeroImagesModal"
  class="chim-modal-root"
  hidden
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
  aria-labelledby="chim-modal-title"
>
  <div class="chim-modal__shell">
    <header class="chim-modal__header">
      <h2 id="chim-modal-title" class="chim-modal__title" data-t="creator.marketing.hero_images_modal_title">Hero Images</h2>
      <button
        type="button"
        class="chim-modal__close"
        id="chim-modal-close"
        aria-label="Close"
        title="Close"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"></path></svg>
      </button>
    </header>
    <div class="chim-modal__body">
      <div class="creator-hero-create-context" id="creatorHeroImagesModalContext">
        <div class="creator-hero-create-scroll" id="creatorHeroCreateScroll">
          <div
            class="creator-content-creation-hero creator-content-creation-hero--mobile"
            id="creatorContentCreationHero"
            data-creator-hero-host
          ></div>
          <div class="creator-eazy-speech-anchor" id="creatorEazySpeechAnchorMar" aria-hidden="true"></div>
        </div>
        
<footer class="creator-hero-eazy-footer creator-hero-eazy-footer--status-only">
  <div class="creator-hero-eazy-proxy" aria-hidden="true">
    <span data-creator-hero-eazy-bubble-wrap></span>
    <button
      type="button"
      class="creator-hero-eazy-proxy__btn"
      data-creator-hero-eazy-start
      disabled
    >
      Start generation
    </button>
  </div>
  <div class="creator-hero-create-status" data-creator-hero-status></div>
</footer>

      </div>
    </div>
  </div>
</div>
