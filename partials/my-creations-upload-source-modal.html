<dialog class="creator-base-modal my-creations-upload-source-modal" id="my-creations-upload-source-modal" aria-labelledby="my-creations-upload-source-title">
  <div class="creator-base-modal__header">
    <h3 id="my-creations-upload-source-title" class="creator-base-modal__title" data-t="creator.my_creations.upload_choose_title">
      Add your finished design
    </h3>
    <button type="button" class="creator-base-modal__close" id="my-creations-upload-source-close" aria-label="Close">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="creator-base-modal__body">
    <p class="my-creations-upload-source-modal__lead" data-t="creator.my_creations.upload_choose_subtitle">Where is the file?</p>
    <div class="my-creations-upload-source-modal__options">
      <button type="button" class="my-creations-upload-source-modal__option" data-my-creations-upload-source="device">
        <span class="my-creations-upload-source-modal__icon" aria-hidden="true">&#128187;</span>
        <span class="my-creations-upload-source-modal__label" data-t="creator.my_creations.upload_from_device">This device</span>
        <small class="my-creations-upload-source-modal__desc" data-t="creator.my_creations.upload_from_device_desc">Choose PNG, JPG, or SVG from your computer</small>
      </button>
      <button type="button" class="my-creations-upload-source-modal__option" data-my-creations-upload-source="mobile">
        <span class="my-creations-upload-source-modal__icon" aria-hidden="true">&#128241;</span>
        <span class="my-creations-upload-source-modal__label" data-t="creator.my_creations.upload_from_mobile">Mobile</span>
        <small class="my-creations-upload-source-modal__desc" data-t="creator.my_creations.upload_from_mobile_desc">Scan the QR code with your phone, then continue with title and options here</small>
      </button>
    </div>
  </div>
</dialog>
