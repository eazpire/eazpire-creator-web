<style>
  /* Base modal - dialog element */
  .creator-base-modal {
    position: fixed;
    z-index: 10050;
    border: none;
    border-radius: 16px;
    padding: 0;
    background: #fff;
    max-width: 520px;
    width: 95vw;
    max-height: 90vh;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  .creator-base-modal[open] {
    display: flex;
    flex-direction: column;
  }

  .creator-base-modal::backdrop {
    background: rgba(0, 0, 0, 0.5);
  }

  /* Header - fixed, no shrink */
  .creator-base-modal__header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
    gap: 12px;
  }

  .creator-base-modal__title {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #111827;
  }

  .creator-base-modal__close {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    border-radius: 8px;
    transition: background 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }

  .creator-base-modal__close:hover {
    background: #f3f4f6;
    color: #111827;
  }

  .creator-base-modal__close svg {
    width: 20px;
    height: 20px;
  }

  /* Body - scrollable */
  .creator-base-modal__body {
    flex: 1;
    overflow-y: auto;
    min-height: 200px;
    padding: 16px 20px;
  }
  .creator-base-modal__body::-webkit-scrollbar {
    width: 8px;
  }
  .creator-base-modal__body::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.08);
    border-radius: 4px;
  }
  .creator-base-modal__body::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.25);
    border-radius: 4px;
  }
  .creator-base-modal__body::-webkit-scrollbar-thumb:hover {
    background: rgba(0,0,0,0.35);
  }
  body.creator-mode .creator-base-modal__body::-webkit-scrollbar-track,
  body[data-creator-mode="true"] .creator-base-modal__body::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.25);
  }
  body.creator-mode .creator-base-modal__body::-webkit-scrollbar-thumb,
  body[data-creator-mode="true"] .creator-base-modal__body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
  }
  body.creator-mode .creator-base-modal__body::-webkit-scrollbar-thumb:hover,
  body[data-creator-mode="true"] .creator-base-modal__body::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.3);
  }

  /* Footer - fixed */
  .creator-base-modal__footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 20px;
    border-top: 1px solid #e5e7eb;
    background: #fff;
    flex-shrink: 0;
    gap: 12px;
  }

  /* Dark Mode: Creator-Seiten */
  body.creator-mode .creator-base-modal,
  body[data-creator-mode="true"] .creator-base-modal {
    background: #1f2937;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  }
  body.creator-mode .creator-base-modal::backdrop,
  body[data-creator-mode="true"] .creator-base-modal::backdrop {
    background: rgba(0, 0, 0, 0.75);
  }
  body.creator-mode .creator-base-modal__header,
  body[data-creator-mode="true"] .creator-base-modal__header {
    background: #1f2937;
    border-bottom-color: rgba(255, 255, 255, 0.1);
  }
  body.creator-mode .creator-base-modal__title,
  body[data-creator-mode="true"] .creator-base-modal__title {
    color: #f3f4f6;
  }
  body.creator-mode .creator-base-modal__close,
  body[data-creator-mode="true"] .creator-base-modal__close {
    color: #9ca3af;
  }
  body.creator-mode .creator-base-modal__close:hover,
  body[data-creator-mode="true"] .creator-base-modal__close:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #f3f4f6;
  }
  body.creator-mode .creator-base-modal__body,
  body[data-creator-mode="true"] .creator-base-modal__body {
    color: #e5e7eb;
  }
  body.creator-mode .creator-base-modal__footer,
  body[data-creator-mode="true"] .creator-base-modal__footer {
    background: #1f2937;
    border-top-color: rgba(255, 255, 255, 0.1);
  }
  .creator-base-modal__btn {
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #f9fafb;
    color: #111827;
    border: 1px solid #e5e7eb;
  }
  .creator-base-modal__btn:hover {
    border-color: #F59E0B;
    background: #fffbeb;
    color: #92400e;
  }
  body.creator-mode .creator-base-modal__btn,
  body[data-creator-mode="true"] .creator-base-modal__btn {
    background: rgba(2,6,23,0.35);
    color: #e5e7eb;
    border: 1px solid rgba(255,255,255,0.12);
  }
  body.creator-mode .creator-base-modal__btn:hover,
  body[data-creator-mode="true"] .creator-base-modal__btn:hover {
    border-color: var(--creator-accent, #F59E0B);
    background: rgba(245,158,11,0.12);
    color: var(--creator-accent, #F59E0B);
  }

  /* Responsive - fullscreen on mobile (Account Modal pattern) */
  @media (max-width: 749px) {
    .creator-base-modal {
      max-width: 100vw;
      width: 100vw;
      max-height: 100dvh;
      height: 100dvh;
      border-radius: 0;
      margin: 0;
    }

    .creator-base-modal__body {
      min-height: 0;
      padding: 12px 16px;
    }

    .creator-base-modal__footer {
      padding: 10px 16px;
    }
  }
</style>


<dialog class="creator-base-modal creator-audio-modal" id="creatorAudioModal" aria-labelledby="creator-audio-modal-title">
  <div class="creator-audio-modal__header">
    <h3 id="creator-audio-modal-title" class="creator-base-modal__title" data-t="creator.audio.title">Audio Library</h3>
    <button type="button" class="creator-base-modal__close" id="creatorAudioModalClose" aria-label="Close">
      <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="creator-audio-modal__body">
    <ul class="creator-audio-modal__list" id="creatorAudioModalList" role="list">
      <li class="creator-audio-modal__empty" id="creatorAudioModalEmpty" data-t="creator.audio.empty">No audio files yet. Add one to get started.</li>
    </ul>
  </div>

  <div class="creator-audio-modal__footer">
    <div class="creator-audio-modal__volume-controls">
      <button type="button" class="creator-audio-modal__mute-btn" id="creatorAudioModalMuteBtn" aria-label="Mute">
        <svg class="creator-audio-modal__mute-icon creator-audio-modal__mute-icon--unmuted" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <svg class="creator-audio-modal__mute-icon creator-audio-modal__mute-icon--muted" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
      <input type="range" class="creator-audio-modal__volume-slider" id="creatorAudioModalVolumeSlider" min="0" max="100" value="100" aria-label="Volume">
    </div>
    <div class="creator-audio-modal__actions">
      <label class="creator-audio-modal__add-btn">
        <input type="file" id="creatorAudioModalFileInput" accept="audio/mpeg,audio/mp3,audio/wav,audio/ogg,audio/webm" hidden>
        <span data-t="creator.audio.add">Add</span>
      </label>
      <button type="button" class="creator-audio-modal__use-btn" id="creatorAudioModalUseBtn" disabled data-t="creator.audio.use">Use</button>
    </div>
  </div>
</dialog>

<dialog class="creator-audio-modal creator-audio-confirm-modal" id="creatorAudioConfirmModal" aria-labelledby="creator-audio-confirm-title">
  <div class="creator-audio-confirm-modal__content">
    <h4 id="creator-audio-confirm-title" class="creator-audio-confirm-modal__title"></h4>
    <p class="creator-audio-confirm-modal__desc" id="creatorAudioConfirmDesc"></p>
    <div class="creator-audio-confirm-modal__actions">
      <button type="button" class="creator-audio-confirm-modal__btn creator-audio-confirm-modal__btn--cancel" id="creatorAudioConfirmCancel"></button>
      <button type="button" class="creator-audio-confirm-modal__btn creator-audio-confirm-modal__btn--remove" id="creatorAudioConfirmRemove"></button>
    </div>
  </div>
</dialog>
