<div class="creator-marketing" id="creatorMarketing" data-marketing-subtab="" data-marketing-parent="" data-marketing-content="">
  <div class="cmkt-scroll" id="creatorMarketingScroll">
    <div class="cmkt-tree" id="creatorMarketingTree">
      <div class="cmkt-level cmkt-level--parents">
        <div class="cmkt-parents-grid" role="group" aria-label="Content Creation">
          <button type="button" class="cmkt-card cmkt-card--parent" data-mkt-parent="content-creation" aria-expanded="false" data-eazy-guide="marketing.content-creation">
            <span class="cmkt-card__icon" aria-hidden="true">✨</span>
            <span class="cmkt-card__title" data-t="creator.marketing.content_creation">Content Creation</span>
          </button>
          <button type="button" class="cmkt-card cmkt-card--parent" data-mkt-parent="content-publish" aria-expanded="false" data-eazy-guide="marketing.content-publish">
            <span class="cmkt-card__icon" aria-hidden="true">📤</span>
            <span class="cmkt-card__title" data-t="creator.marketing.content_publish">Content Publish</span>
          </button>
          <button type="button" class="cmkt-card cmkt-card--parent" data-mkt-parent="promotions" aria-expanded="false" data-eazy-guide="marketing.promotion">
            <span class="cmkt-card__icon" aria-hidden="true">🏷️</span>
            <span class="cmkt-card__title" data-t="creator.marketing.promotion">Promotion</span>
          </button>
        </div>
      </div>

      
      <div class="cmkt-level cmkt-level--children" data-mkt-branch="content-creation" hidden>
        <div class="cmkt-trunk" aria-hidden="true"></div>
        <div class="cmkt-children-grid cmkt-children-grid--creation">
          <button type="button" class="cmkt-card cmkt-card--child" data-mkt-child="images" data-mkt-for="content-creation" aria-expanded="false" data-eazy-guide="marketing.images-create">
            <span class="cmkt-card__icon" aria-hidden="true">📷</span>
            <span class="cmkt-card__title" data-t="creator.marketing.images">Images</span>
          </button>
          <button type="button" class="cmkt-card cmkt-card--child" data-mkt-child="videos" data-mkt-for="content-creation" aria-expanded="false" data-eazy-guide="marketing.video-create">
            <span class="cmkt-card__icon" aria-hidden="true">🎬</span>
            <span class="cmkt-card__title" data-t="creator.marketing.video">Video</span>
          </button>
        </div>
      </div>

      
      <div class="cmkt-level cmkt-level--children" data-mkt-branch="content-publish" hidden>
        <div class="cmkt-trunk" aria-hidden="true"></div>
        <div class="cmkt-children-grid cmkt-children-grid--publish">
          <button type="button" class="cmkt-card cmkt-card--child" data-mkt-child="hero-images" data-mkt-for="content-publish" aria-expanded="false" data-eazy-guide="marketing.publish-heroes">
            <span class="cmkt-card__icon" aria-hidden="true">🖼️</span>
            <span class="cmkt-card__title" data-t="creator.marketing.hero_images">Hero Images</span>
          </button>
          <button
            type="button"
            class="creator-video-tool-card cmkt-card--function"
            data-mkt-function="social-media-manager"
            data-smm-open
            data-eazy-guide="marketing.social-media-manager"
          >
            <span class="creator-video-tool-card__icon" aria-hidden="true">📣</span>
            <span class="creator-video-tool-card__title" data-t="creator.social_media_manager.title">Social Media Manager</span>
            <span class="creator-video-tool-card__desc" data-t="creator.social_media_manager.card_desc">Connect your accounts and publish posts.</span>
          </button>
        </div>
      </div>

      
      <div class="creator-marketing-panel creator-marketing-panel--hidden" id="creatorMarketingPanelCreation" data-subtab="content-creation" hidden>
        <div class="cmkt-trunk cmkt-trunk--leaf" aria-hidden="true"></div>
        <div class="creator-marketing-panel-content" data-content="images">
          <div class="creator-images-create-context">
            <div class="creator-hero-create-scroll" id="creatorImagesCreateScroll">
              <div class="creator-content-creation-images creator-content-creation-hero--mobile" id="creatorContentCreationImages" data-creator-images-host></div>
            </div>
          </div>
        </div>
        <div class="creator-marketing-panel-content" data-content="videos">
          <div class="creator-video-create-context">
            <div class="creator-hero-create-scroll" id="creatorVideoCreateScroll">
              <div class="creator-content-creation-video creator-content-creation-hero--mobile" id="creatorContentCreationVideo" data-creator-video-host></div>
              <div class="creator-eazy-speech-anchor" id="creatorEazySpeechAnchorVideo" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>

      
      <div class="creator-marketing-panel creator-marketing-panel--hidden" id="creatorMarketingPanelPublish" data-subtab="content-publish" hidden>
        <div class="cmkt-trunk cmkt-trunk--leaf" aria-hidden="true"></div>
        <div class="creator-marketing-panel-content" data-content="hero-images">
          <div class="creator-hero-images-panel" id="creatorHeroImagesPanel">
            <div class="creator-hero-images-grid-wrap">
              <div id="creatorHeroImagesLoading" class="creator-hero-images-loading" style="display:none">Loading...</div>
              <div id="creatorHeroImagesEmpty" class="creator-hero-images-empty" style="display:none">No hero images yet.</div>
              <div id="creatorHeroImagesGrid" class="creator-hero-images-grid creator-hero-images-grid--2"></div>
            </div>
          </div>
        </div>
      </div>

      
      <div class="creator-marketing-panel creator-marketing-panel--hidden" id="creatorMarketingPanelPromotions" data-subtab="promotions" hidden>
        <div class="cmkt-trunk cmkt-trunk--leaf" aria-hidden="true"></div>
        
<div class="eaz-creator-promotions" id="eazCreatorPromotionsRoot">
  <div
    class="eaz-creator-promotions__sub-tabs"
    id="eazCreatorPromotionsSubTabs"
    role="tablist"
    aria-label="Filter promotions by status"
  >
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab is-active" data-promo-tab="active" aria-selected="true" id="eazPromoSubTabActive">Active</button>
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab" data-promo-tab="upcoming" aria-selected="false" id="eazPromoSubTabUpcoming">Upcoming</button>
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab" data-promo-tab="ended" aria-selected="false" id="eazPromoSubTabEnded">Ended</button>
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab" data-promo-tab="all" aria-selected="false" id="eazPromoSubTabAll">All</button>
  </div>
  <p class="eaz-creator-promotions__tab-empty" id="eazCreatorPromotionsTabEmpty" hidden role="status"></p>
  <div class="eaz-creator-promotions__grid" id="eazCreatorPromotionsGrid" aria-live="polite"></div>
  <p class="eaz-creator-promotions__hint" id="eazCreatorPromotionsLoading" data-t="creator.common.loading">Loading...</p>
  <p class="eaz-creator-promotions__empty" id="eazCreatorPromotionsEmpty" hidden>No promotions yet.</p>
  <p class="eaz-creator-promotions__error" id="eazCreatorPromotionsError" hidden role="alert"></p>
</div>

      </div>
    </div>
  </div>
</div>
