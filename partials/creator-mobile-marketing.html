<div class="creator-marketing" id="creatorMarketing" data-marketing-subtab="content-creation">
  <div class="creator-marketing-tabs">
    <div class="creator-marketing-tabs-nav">
      <button type="button" class="creator-marketing-tab is-active" data-subtab="content-creation">Content Creation</button>
      <button type="button" class="creator-marketing-tab" data-subtab="content-publish">Content Publish</button>
      <button type="button" class="creator-marketing-tab" data-subtab="promotions">Promotions</button>
    </div>
  </div>

  <div class="creator-marketing-panel" id="creatorMarketingPanelCreation" data-subtab="content-creation">
    <div class="creator-marketing-under-tabs">
      <button type="button" class="creator-marketing-under-tab is-active" data-content="hero-images">Hero Images</button>
      <button type="button" class="creator-marketing-under-tab" data-content="videos">Videos</button>
      <button type="button" class="creator-marketing-under-tab" data-content="images">Images</button>
    </div>
    <div class="creator-marketing-panel-content is-active" data-content="hero-images">
      <div class="creator-hero-create-context">
        <div class="creator-hero-create-scroll" id="creatorHeroCreateScroll">
          <div class="creator-content-creation-hero creator-content-creation-hero--mobile" id="creatorContentCreationHero" data-creator-hero-host></div>
          <div class="creator-eazy-speech-anchor" id="creatorEazySpeechAnchorMar" aria-hidden="true"></div>
        </div>
        
<footer class="creator-hero-eazy-footer creator-hero-eazy-footer--status-only">
  <div class="creator-hero-eazy-proxy" aria-hidden="true">
    <span data-creator-hero-eazy-bubble-wrap></span>
    <button
      type="button"
      class="creator-hero-eazy-proxy__btn"
      data-creator-hero-eazy-start
      disabled
    >
      Start generation
    </button>
  </div>
  <div class="creator-hero-create-status" data-creator-hero-status></div>
</footer>

      </div>
    </div>
    <div class="creator-marketing-panel-content" data-content="videos">
      <div class="creator-video-create-context">
        <div class="creator-hero-create-scroll" id="creatorVideoCreateScroll">
          <div class="creator-content-creation-video creator-content-creation-hero--mobile" id="creatorContentCreationVideo" data-creator-video-host></div>
          <div class="creator-eazy-speech-anchor" id="creatorEazySpeechAnchorVideo" aria-hidden="true"></div>
        </div>
        
<footer class="creator-video-eazy-footer creator-hero-eazy-footer creator-hero-eazy-footer--status-only">
  <div class="creator-hero-eazy-proxy" aria-hidden="true">
    <span data-creator-video-eazy-bubble-wrap></span>
    <button
      type="button"
      class="creator-hero-eazy-proxy__btn"
      data-creator-video-eazy-start
      disabled
    >
      Start generation
    </button>
  </div>
  <div class="creator-video-eazy-footer__bar">
    <div class="creator-hero-create-status" data-creator-video-status></div>
    <button
      type="button"
      class="creator-video-eazy-footer__studio-btn"
      data-t="creator.video_studio.title"
      data-creator-video-studio-open
    >Video Studio</button>
  </div>
</footer>

      </div>
    </div>
    <div class="creator-marketing-panel-content" data-content="images">
      <div class="creator-marketing-coming-soon-block">
        <span class="creator-marketing-coming-soon-label">Coming soon</span>
        <p>Images</p>
      </div>
    </div>
  </div>

  <div class="creator-marketing-panel creator-marketing-panel--hidden" id="creatorMarketingPanelPublish" data-subtab="content-publish" hidden>
    <div class="creator-marketing-under-tabs">
      <button type="button" class="creator-marketing-under-tab is-active" data-content="hero-images">Hero Images</button>
      <button type="button" class="creator-marketing-under-tab" data-content="videos">Videos</button>
      <button type="button" class="creator-marketing-under-tab" data-content="images">Images</button>
    </div>
    <div class="creator-marketing-panel-content is-active" data-content="hero-images">
      <div class="creator-hero-images-panel" id="creatorHeroImagesPanel">
        <div class="creator-hero-images-grid-wrap">
          <div id="creatorHeroImagesLoading" class="creator-hero-images-loading" style="display:none">Loading...</div>
          <div id="creatorHeroImagesEmpty" class="creator-hero-images-empty" style="display:none">No hero images yet.</div>
          <div id="creatorHeroImagesGrid" class="creator-hero-images-grid creator-hero-images-grid--2"></div>
        </div>
      </div>
    </div>
    <div class="creator-marketing-panel-content" data-content="videos">
      <div class="creator-videos-publish-panel" id="creatorVideosPublishPanel">
        <div class="creator-hero-images-grid-wrap">
          <div id="creatorVideosLoading" class="creator-hero-images-loading" style="display:none">Loading...</div>
          <div id="creatorVideosEmpty" class="creator-hero-images-empty" style="display:none">No videos yet.</div>
          <div id="creatorVideosGrid" class="creator-hero-images-grid creator-hero-images-grid--2"></div>
        </div>
      </div>
    </div>
    <div class="creator-marketing-panel-content" data-content="images">
      <div class="creator-publish-images-panel" id="creatorPublishImagesPanel">
        <div class="creator-hero-images-grid-wrap">
          <div id="creatorPublishImagesLoading" class="creator-hero-images-loading" style="display:none">Loading...</div>
          <div id="creatorPublishImagesEmpty" class="creator-hero-images-empty" style="display:none">No saved images yet.</div>
          <div id="creatorPublishImagesGrid" class="creator-hero-images-grid creator-hero-images-grid--2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="creator-marketing-panel creator-marketing-panel--hidden" id="creatorMarketingPanelPromotions" data-subtab="promotions" hidden>
    
<div class="eaz-creator-promotions" id="eazCreatorPromotionsRoot">
  <div
    class="eaz-creator-promotions__sub-tabs"
    id="eazCreatorPromotionsSubTabs"
    role="tablist"
    aria-label="Filter promotions by status"
  >
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab is-active" data-promo-tab="active" aria-selected="true" id="eazPromoSubTabActive">Active</button>
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab" data-promo-tab="upcoming" aria-selected="false" id="eazPromoSubTabUpcoming">Upcoming</button>
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab" data-promo-tab="ended" aria-selected="false" id="eazPromoSubTabEnded">Ended</button>
    <button type="button" role="tab" class="eaz-creator-promotions__sub-tab" data-promo-tab="all" aria-selected="false" id="eazPromoSubTabAll">All</button>
  </div>
  <p class="eaz-creator-promotions__tab-empty" id="eazCreatorPromotionsTabEmpty" hidden role="status"></p>
  <div class="eaz-creator-promotions__grid" id="eazCreatorPromotionsGrid" aria-live="polite"></div>
  <p class="eaz-creator-promotions__hint" id="eazCreatorPromotionsLoading" data-t="creator.common.loading">Loading...</p>
  <p class="eaz-creator-promotions__empty" id="eazCreatorPromotionsEmpty" hidden>No promotions yet.</p>
  <p class="eaz-creator-promotions__error" id="eazCreatorPromotionsError" hidden role="alert"></p>
</div>

  </div>
</div>
