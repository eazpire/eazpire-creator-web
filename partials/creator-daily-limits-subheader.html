<div
  class="creator-daily-limits"
  data-creator-daily-limits
  aria-label="Daily creation and publish limits"
  data-i18n-uploads="Uploads"
  data-i18n-designs="Generations"
  data-i18n-publishes="Publishes"
  data-i18n-locked="Locked"
  data-i18n-countdown-aria="Time until daily limits reset"
>
  <div class="creator-daily-limits__row">
    <div class="creator-daily-limits__item" data-limit="upload" data-eazy-guide="chrome.limit-uploads">
      <span class="creator-daily-limits__label">
        <span class="creator-daily-limits__name" data-t="creator.daily_limits_subheader.uploads">Uploads</span>
      </span>
      <span class="creator-daily-limits__bar" aria-hidden="true">
        <span class="creator-daily-limits__bar-fill creator-daily-limits__bar-fill--upload" data-limit-fill style="width:0%"></span>
        <span class="creator-daily-limits__bar-text" data-limit-count>—</span>
      </span>
    </div>
    <span class="creator-daily-limits__divider" aria-hidden="true">│</span>
    <div class="creator-daily-limits__item" data-limit="design" data-eazy-guide="chrome.limit-generations">
      <span class="creator-daily-limits__label">
        <span class="creator-daily-limits__name" data-t="creator.daily_limits_subheader.designs">Generations</span>
      </span>
      <span class="creator-daily-limits__bar" aria-hidden="true">
        <span class="creator-daily-limits__bar-fill creator-daily-limits__bar-fill--design" data-limit-fill style="width:0%"></span>
        <span class="creator-daily-limits__bar-text" data-limit-count>—</span>
      </span>
    </div>
    <span class="creator-daily-limits__divider" aria-hidden="true">│</span>
    <div class="creator-daily-limits__item" data-limit="publish" data-eazy-guide="chrome.limit-publishes">
      <span class="creator-daily-limits__label">
        <span class="creator-daily-limits__name" data-t="creator.daily_limits_subheader.publishes">Publishes</span>
      </span>
      <span class="creator-daily-limits__bar" aria-hidden="true">
        <span class="creator-daily-limits__bar-fill creator-daily-limits__bar-fill--publish" data-limit-fill style="width:0%"></span>
        <span class="creator-daily-limits__bar-text" data-limit-count>—</span>
      </span>
    </div>
    <div class="creator-daily-limits__timer-wrap">
      <div
        class="creator-daily-limits__countdown"
        data-limit-countdown
        data-eazy-guide="chrome.limit-countdown"
        hidden
        aria-hidden="true"
      >
        <span
          class="creator-daily-limits__countdown-bar"
          aria-hidden="true"
        >
          <span class="creator-daily-limits__countdown-fill" data-countdown-fill style="width:100%"></span>
        </span>
        <span class="creator-daily-limits__countdown-text" data-countdown-text aria-live="polite">—</span>
      </div>
    </div>
  </div>
</div>
